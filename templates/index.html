<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORIAN AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #090d16; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans h-screen flex overflow-hidden">

    <!-- 1. SIDEBAR (Chap panel) -->
    <div id="sidebar" class="w-80 bg-[#070a12] flex flex-col border-r border-slate-900 h-full sidebar-transition z-20 relative shrink-0">
        <div class="overflow-y-auto flex-1 p-4 space-y-6">
            
            <!-- A. BLOKNOTLAR BO'LIMI -->
            <div>
                <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Блокноты</h3>
                <button onclick="createNewItem('notebook')" class="w-full bg-slate-900/50 hover:bg-slate-800 border border-slate-800 text-slate-300 text-sm font-medium py-2.5 px-4 rounded-xl flex items-center gap-2 transition mb-3">
                    <i class="fas fa-plus text-xs"></i> Новый блокнот
                </button>
                <div class="space-y-1" id="notebook-list">
                    {% for box in notebooks %}
                    <button onclick="loadChat({{ box.id }}, this)" class="chat-item w-full text-left px-3 py-2 rounded-xl text-slate-400 hover:bg-slate-900 hover:text-white flex items-center gap-2.5 text-sm transition truncate">
                        <i class="far fa-sticky-note text-slate-500"></i>
                        <span class="truncate">{{ box.title }}</span>
                    </button>
                    {% endfor %}
                </div>
            </div>

            <!-- B. NEDAVNIYE (CHAT TARIXI) BO'LIMI -->
            <div>
                <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Недавние</h3>
                <div class="space-y-1" id="chat-list">
                    {% for chat in recents %}
                    <button onclick="loadChat({{ chat.id }}, this)" class="chat-item w-full text-left px-3 py-2 rounded-xl text-slate-400 hover:bg-slate-900 hover:text-white flex items-center gap-2.5 text-sm transition truncate">
                        <i class="far fa-comment text-slate-500"></i>
                        <span class="truncate">{{ chat.title }}</span>
                    </button>
                    {% endfor %}
                </div>
            </div>
        </div>
        
        <!-- C. PASTKI PROFIL SOHASI (Skrinshotdagidek) -->
        <div class="p-4 border-t border-slate-900 bg-[#05070d] flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-blue-600 border border-slate-700 flex items-center justify-center font-bold text-sm text-white uppercase shadow-sm">
                    {{ user_name[:2] }}
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-slate-200 truncate max-w-[140px]">{{ user_name }}</span>
                    <a href="/logout" class="text-[10px] text-red-400 hover:underline">Chiqish</a>
                </div>
            </div>
            <button class="p-2 text-slate-500 hover:text-slate-300 transition">
                <i class="fas fa-cog text-lg"></i>
            </button>
        </div>
    </div>

    <!-- 2. ASOSIY INTEGRAL CHAT MAYDONI -->
    <div class="flex-1 flex flex-col h-full relative bg-[#0b0f19]">
        <!-- Topbar va Gamburger menyu -->
        <div class="h-14 border-b border-slate-900 px-4 flex items-center gap-4 bg-[#070a12]/60 backdrop-blur">
            <button onclick="toggleSidebar()" class="p-2 text-slate-400 hover:text-white transition rounded-lg hover:bg-slate-900">
                <i class="fas fa-bars text-lg"></i>
            </button>
            <h2 class="font-semibold text-sm text-slate-300" id="current-chat-title">DORIAN AI</h2>
        </div>

        <!-- Xabarlar oynasi -->
        <div class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col" id="messages-container">
            <div class="flex items-center justify-center h-full text-slate-500 flex-col space-y-2" id="welcome-screen">
                <i class="fas fa-shield-cat text-4xl text-blue-500/80 mb-2"></i>
                <p class="font-medium text-sm text-slate-300">Xush kelibsiz, {{ user_name }}!</p>
                <p class="text-xs text-slate-600 max-w-xs text-center">Tarixni berkitish uchun tepadagi uchta chiziqchani bosing. Bloknot yoki Chat ochib ishlashingiz mumkin.</p>
            </div>
        </div>

        <!-- Preview Img -->
        <div id="image-preview-container" class="hidden px-6 py-2 bg-slate-950/40 border-t border-slate-900 flex items-center gap-3">
            <div class="relative w-12 h-12 bg-slate-900 rounded-lg overflow-hidden border border-slate-800">
                <img id="image-preview" src="" class="w-full h-full object-cover">
                <button onclick="clearImage()" class="absolute top-0 right-0 bg-red-600 text-white text-xs w-4 h-4 flex items-center justify-center rounded-bl">&times;</button>
            </div>
            <span id="image-name" class="text-xs text-slate-500 truncate max-w-xs"></span>
        </div>

        <!-- Input maydoni -->
        <div class="p-4 bg-[#070a12]/30">
            <form id="chat-form" onsubmit="sendMessage(event)" class="max-w-3xl mx-auto flex items-center bg-[#070a12] border border-slate-900 rounded-xl p-1.5 focus-within:border-slate-700 transition">
                <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewFile()">
                <button type="button" onclick="document.getElementById('image-input').click()" class="p-2.5 text-slate-500 hover:text-blue-500 transition rounded-lg">
                    <i class="fas fa-paperclip text-base"></i>
                </button>
                <input type="text" id="message-text" placeholder="DORIANga nimanidir yozing..." class="flex-1 bg-transparent border-0 outline-none px-3 py-2 text-sm text-slate-200 placeholder-slate-700">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white p-2.5 rounded-lg transition flex items-center justify-center">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        let currentChatId = null;

        // Sidebar yashirish/ko'rsatish logikasi (Gamburger)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('w-80')) {
                sidebar.classList.remove('w-80');
                sidebar.classList.add('w-0', '-translate-x-full');
            } else {
                sidebar.classList.remove('w-0', '-translate-x-full');
                sidebar.classList.add('w-80');
            }
        }

        // Yangi Chat yoki Yangi Bloknot yaratish
        async function createNewItem(type) {
            const promptTitle = type === 'notebook' ? "Yangi bloknot nomi:" : "Yangi suhbat mavzusi:";
            const defaultTitle = type === 'notebook' ? "Yangi bloknot" : "Yangi suhbat";
            const title = prompt(promptTitle, defaultTitle);
            if (!title) return;

            const response = await fetch('/chat/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, type: type })
            });
            const data = await response.json();
            
            const targetList = document.getElementById(type === 'notebook' ? 'notebook-list' : 'chat-list');
            const icon = type === 'notebook' ? 'far fa-sticky-note' : 'far fa-comment';
            
            const btn = document.createElement('button');
            btn.onclick = () => loadChat(data.chat_id, btn);
            btn.className = "chat-item w-full text-left px-3 py-2 rounded-xl text-slate-400 hover:bg-slate-900 hover:text-white flex items-center gap-2.5 text-sm transition truncate";
            btn.innerHTML = `<i class="${icon} text-slate-500"></i><span class="truncate">${data.title}</span>`;
            
            targetList.insertBefore(btn, targetList.firstChild);
            loadChat(data.chat_id, btn);
        }

        // Tizimga yuklash
        async function loadChat(chatId, element) {
            currentChatId = chatId;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('bg-slate-900', 'text-white'));
            element.classList.add('bg-slate-900', 'text-white');
            document.getElementById('current-chat-title').innerText = element.querySelector('span').innerText;

            const response = await fetch(`/chat/${chatId}/messages`);
            const messages = await response.json();
            const container = document.getElementById('messages-container');
            container.innerHTML = ''; 

            if(messages.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-700 my-auto text-xs">Yozishmani boshlang, jigar.</div>`;
            } else {
                messages.forEach(msg => appendMessage(msg.role, msg.content, msg.image_path));
            }
            scrollBottom();
        }

        function appendMessage(role, content, imgPath) {
            const container = document.getElementById('messages-container');
            const welcome = document.getElementById('welcome-screen');
            if(welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            let imgHtml = imgPath ? `<img src="${imgPath}" class="max-w-xs max-h-40 rounded-xl mb-1.5 object-cover border border-slate-800">` : '';
            const bubbleBg = role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-slate-900 text-slate-300 rounded-bl-none border border-slate-900';
            
            msgDiv.innerHTML = `
                <div class="max-w-xl flex flex-col">
                    ${imgHtml}
                    <div class="${bubbleBg} px-3.5 py-2.5 rounded-xl text-xs leading-relaxed whitespace-pre-line shadow-sm">
                        ${content}
                    </div>
                </div>
            `;
            container.appendChild(msgDiv);
        }

        function previewFile() {
            const file = document.getElementById('image-input').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-name').innerText = file.name;
                document.getElementById('image-preview-container').classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        }

        function clearImage() {
            document.getElementById('image-input').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        async function sendMessage(event) {
            event.preventDefault();
            if (!currentChatId) {
                // Agar hech narsa tanlanmagan bo'lsa avtomat oddiy Chat ochib yuboradi
                await createNewItem('chat');
                if(!currentChatId) return;
            }

            const textInput = document.getElementById('message-text');
            const fileInput = document.getElementById('image-input');
            const text = textInput.value.trim();
            const file = fileInput.files[0];
            if(!text && !file) return;

            let localImgUrl = file ? document.getElementById('image-preview').src : null;
            appendMessage('user', text, localImgUrl);
            scrollBottom();
            textInput.value = '';
            clearImage();

            const container = document.getElementById('messages-container');
            const loader = document.createElement('div');
            loader.id = "dorian-loader";
            loader.className = "flex justify-start w-full";
            loader.innerHTML = `<div class="bg-slate-900 text-slate-500 px-3 py-2 rounded-xl text-xs flex items-center gap-2 border border-slate-900"><i class="fas fa-circle-notch animate-spin text-blue-500"></i> O'ylamoqda...</div>`;
            container.appendChild(loader);
            scrollBottom();

            const formData = new FormData();
            formData.append('message', text);
            if(file) formData.append('image', file);

            try {
                const response = await fetch(`/chat/${currentChatId}/send`, { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('dorian-loader').remove();
                appendMessage('model', data.ai_response, null);
                scrollBottom();
            } catch (error) {
                document.getElementById('dorian-loader').remove();
            }
        }

        function scrollBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
